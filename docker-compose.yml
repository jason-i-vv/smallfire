version: '3.8'

services:
  # ============================================
  # PostgreSQL 数据库
  # ============================================
  postgres:
    image: postgres:18
    container_name: starfire-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: starfire_quant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - starfire-network
    restart: unless-stopped

  # ============================================
  # 后端 API 服务
  # ============================================
  backend:
    image: ${REGISTRY:-registry.cn-hangzhou.aliyuncs.com/deepcoin}/starfire-backend:${IMAGE_TAG:-latest}
    container_name: starfire-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      AI_API_KEY: ${AI_API_KEY:-}
    volumes:
      - ./config:/root/config:ro
    networks:
      - starfire-network
    restart: unless-stopped

  # ============================================
  # 前端服务 (Nginx)
  # ============================================
  frontend:
    image: ${REGISTRY:-registry.cn-hangzhou.aliyuncs.com/deepcoin}/starfire-frontend:${IMAGE_TAG:-latest}
    container_name: starfire-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - starfire-network
    restart: unless-stopped

networks:
  starfire-network:
    driver: bridge

volumes:
  postgres_data:
