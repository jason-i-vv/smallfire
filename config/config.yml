# 系统基础配置
app:
  name: "星火量化"
  mode: "debug"
  host: "0.0.0.0"
  port: 8080
  timezone: "Asia/Shanghai"

# 数据库配置
database:
  host: "${DB_HOST}"
  port: 5432
  user: "postgres"
  password: "${DB_PASSWORD}"
  dbname: "starfire_quant"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 5

# 日志配置
log:
  level: "debug"
  format: "json"
  output: "stdout"

# 飞书通知配置
feishu:
  enabled: false
  webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/c585be48-9114-4f71-bf3d-0f82f98ba4d6"
  send_summary: false
  summary_interval: 6
  summary_times:
    - "09:00"
    - "15:00"
    - "21:00"

# JWT配置
jwt:
  enabled: true                  # 是否启用认证（开发时可关闭）
  secret: "${JWT_SECRET}"
  expires: "24h"

# 市场配置
markets:
  bybit:
    enabled: true
    api_key: ""           # 可选，用于私有接口
    api_secret: ""        # 可选
    testnet: false
    symbols_limit: 500    # 最多跟踪的交易对数量
    hot_days: 30          # 热度有效期（天）
    periods: ["15m", "1h", "4h"] # 抓取周期
    fetch_interval: 60    # 抓取间隔（秒）
    max_concurrent_sync: 10 # 最大并发同步数
  a_stock:
    enabled: true
    symbols_limit: 200
    hot_days: 30
    periods: ["1d"]
    fetch_interval: 300
    max_concurrent_sync: 5
  us_stock:
    enabled: false
    symbols_limit: 200
    hot_days: 30
    periods: ["1d"]
    fetch_interval: 300
    max_concurrent_sync: 5

# EMA配置
ema:
  periods: [30, 60, 90]  # EMA计算周期

# 策略配置
strategies:
  runner_interval: 900            # 策略执行间隔（秒），整点对齐执行，应 >= 最短K线周期
  max_concurrent_analysis: 20     # 最大并发分析数
  box:
    enabled: false
    min_klines: 5
    max_klines: 100
    width_threshold: 2.0      # 固定阈值回退值（动态阈值失效时使用）
    breakout_buffer: 0.1

    # 动态阈值参数
    use_dynamic_threshold: true   # 启用动态阈值
    atr_period: 14               # ATR 计算周期（K线数）
    atr_multiplier: 2.0          # 阈值 = ATR均值/价格*100 * 倍数
    min_width_threshold: 0.3     # 最小宽度下限（%）
    max_width_threshold: 5.0    # 最大宽度上限（%）

    # Swing 点检测
    swing_lookback: 2            # 波峰波谷检测回溯K线数
    check_interval: 60
  trend:
    enabled: true
    ema_periods: [30, 60, 90]
    check_interval: 60
    atr_period: 14              # ATR 计算周期
    atr_multiplier: 2.0         # 止损 = ATR × 倍数
    risk_reward_ratio: 2.0      # 盈亏比（止盈距离 / 止损距离）
  key_level:
    enabled: true
    lookback_klines: 200               # 回溯K线数（扩大以捕获中长期价位）
    level_distance: 0.5                 # 突破阈值(%)（从0.2调高，减少假突破）
    min_breakout_age: 5                 # 价位最小成熟期(K线数)
    check_interval: 60
    atr_period: 14                      # ATR 计算周期
    atr_multiplier: 2.0                 # 止损 = ATR × 倍数
    risk_reward_ratio: 2.0              # 盈亏比（止盈距离 / 止损距离）
  volume_price:
    enabled: true
    volatility_multiplier: 2.0
    volume_multiplier: 2.0
    lookback_klines: 20
    check_interval: 60
    atr_period: 14                   # ATR 计算周期
    atr_multiplier: 2.0             # 止损 = ATR × 倍数
    risk_reward_ratio: 2.0           # 盈亏比
  wick:
    enabled: true
    lookback_klines: 100
    body_percent_max: 30        # 实体占比上限（%）
    shadow_min_ratio: 2.0      # 引线最小倍数
    require_trend: true        # 是否要求趋势确认
    fake_breakout_enabled: true # 是否识别假突破
    breakout_threshold: 0.5     # 固定突破阈值（%）回退值
    atr_period: 14              # ATR 计算周期
    atr_multiplier: 3.0         # 突破阈值 = ATR%/price * 3.0
    min_breakout_threshold: 0.5 # 最小突破阈值（%）
    max_breakout_threshold: 5.0 # 最大突破阈值（%）
    strength_lookback: 20      # 历史引线回溯数
    signal_cooldown: 30        # 信号冷却期（分钟）
    check_interval: 60
  candlestick:
    enabled: true
    atr_period: 14               # ATR 计算周期
    body_atr_threshold: 1.0      # 实体最小 ATR 倍数（实体 > ATR*1.0 才算显著大K线）
    atr_multiplier: 2.0          # 止损 = ATR × 倍数
    risk_reward_ratio: 2.0       # 盈亏比（实体 > ATR*1.0 才算显著大K线）
    momentum_min_count: 3         # 三连K最少连续K线数
    star_body_atr_max: 0.3       # 早晨/黄昏之星中间K线实体上限（ATR倍数）
    star_shadow_ratio: 1.0       # 星形影线最小比例
    star_midpoint_min: 0.005     # 第三根K线收盘价穿透第一根中点的最低比例（0.005=0.5%）
    require_trend: true          # 启用趋势过滤
    signal_cooldown: 60          # 同类型信号冷却时间（分钟）
    check_interval: 300
  macd:
    enabled: true
    fast_period: 12              # 快线EMA周期
    slow_period: 26              # 慢线EMA周期
    signal_period: 9             # 信号线EMA周期
    hist_threshold: 0            # MACD柱阈值（接近零轴即触发）
    atr_period: 14               # ATR 计算周期
    atr_multiplier: 2.0          # 止损 = ATR × 倍数
    risk_reward_ratio: 2.0       # 盈亏比
    signal_cooldown: 30          # 信号冷却时间（分钟）
    check_interval: 60

# 交易配置
trading:
  enabled: true
  initial_capital: 100000              # 初始资金: 100000
  position_size: 0.1                   # 单笔仓位比例: 0.1
  stop_loss_percent: 0.02              # 止损比例: 0.02
  take_profit_percent: 0.05            # 止盈比例: 0.05

  # ATR 动态止盈止损（策略未提供建议值时使用）
  atr_period: 14                       # ATR 计算周期
  atr_multiplier: 2.0                  # 止损距离 = ATR × 2.0

  # 风控参数
  max_daily_trades: 10                 # 每日最大交易: 10
  max_open_positions: 5                # 最大持仓数: 5
  max_drawdown_percent: 0.10           # 最大回撤: 0.10
  max_loss_per_trade: 0.02             # 单笔最大亏损: 0.02
  max_stop_loss_percent: 0.05          # 最大止损比例（ATR止损上限）: 5%
  min_risk_reward_ratio: 1.5           # 最低盈亏比，低于此值会调整止盈价

  # 移动止损
  trailing_stop: false                 # 关闭移动止损
  trailing_distance: 0.02              # 移动止损距离: 0.02
  trailing_activate_pct: 0.03          # 移动止损激活阈值（盈利3%后才激活）

  # 信号有效期
  signal_expire_minutes: 60            # 信号过期分钟数: 60

  # 自动交易（模拟）
  auto_trade_enabled: true             # 自动交易开关
  auto_trade_score_threshold: 45       # 自动交易最低评分（与创建阈值45保持一致，解决冷启动问题）
  paper_trading: true                  # 模拟交易模式
  fixed_trade_amount: 1000             # 每笔固定交易金额（USDT）
  min_notify_score_threshold: 80        # 通知最低评分，低于此值不发送通知

  # Bybit Testnet 实盘模拟
  testnet:
    enabled: false                     # 是否启用 Bybit Testnet 模拟交易
    api_key: "DatS4UH1Leyg9qG2Kc"                        # Bybit Testnet API Key
    api_secret: "UlUKA1qDeVRa3XYAuzDbGVyWqZZICWvvmY6y"                     # Bybit Testnet API Secret
    base_url: "https://api-demo.bybit.com"
    score_threshold: 60                # 最低评分阈值
    fixed_trade_amount: 100            # 每笔固定交易金额（USDT）
    leverage: 2                        # 默认杠杆倍数
    max_open_positions: 5              # 最大同时持仓数
    recv_window: "5000"                # API 请求窗口（毫秒）

# 实时监测配置
monitoring:
  price_check_interval: 1              # 价格检查间隔(秒)
  max_concurrent_monitors: 1000       # 最大并发监测数
  cleanup_interval: 300                 # 清理间隔(秒)

# AI 大模型配置
ai:
  enabled: true                        # 是否启用 AI 增强判定
  provider: "openai"                    # 服务商: openai, anthropic, custom
  # base_url: "https://open.bigmodel.cn/api/coding/paas/v4" # API 基础地址（可替换为兼容 API）
  base_url: "https://api.minimaxi.com/v1"
  api_key: "${AI_API_KEY}"                # API Key，通过环境变量设置
  model: "MiniMax-M2.7-highspeed"                 # 模型名称
  max_tokens: 2000                       # 最大输出 token
  temperature: 0.3                      # 温度（越低越确定）
  log_dir: "/root/ai_logs"              # AI 分析日志目录（保存请求和响应）

  # AI 判定触发条件
  judge:
    score_min: 65                       # 公式评分下限（>= 此值才触发）
    score_max: 79                       # 公式评分上限（<= 此值才触发）
    max_daily_calls: 5000                 # 每日最大调用次数
    cooldown_minutes: 30                # 同一标的冷却时间（分钟）
    auto_analyze: false                  # 交易机会产生时自动进行 AI 分析

  # 每日市场简报
  briefing:
    enabled: true                      # 是否启用每日简报
    time: "08:00"                       # 简报生成时间（UTC+8）
    max_tokens: 800                     # 简报最大 token

  # AI 关键价位识别
  key_level:
    enabled: false                      # 关闭AI关键价位，改用算法
    interval_minutes: 240               # 分析间隔（分钟，4小时一次）
    max_daily_calls: 500                # 每日最大调用次数
    cooldown_minutes: 60                # 同一标的冷却时间（分钟）
    kline_count: 200                    # 输入K线数量
    max_levels_per_side: 5              # 每侧最多价位数（支撑5+阻力5）
    request_interval: 3                 # API调用间隔（秒），避免限流
