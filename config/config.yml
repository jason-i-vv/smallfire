# 系统基础配置
app:
  name: "星火量化"
  mode: "debug"
  host: "0.0.0.0"
  port: 8080
  timezone: "Asia/Shanghai"

# 数据库配置
database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "${DB_PASSWORD}"
  dbname: "starfire_quant"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 5

# 日志配置
log:
  level: "debug"
  format: "json"
  output: "stdout"

# 飞书通知配置
feishu:
  enabled: true
  webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/c585be48-9114-4f71-bf3d-0f82f98ba4d6"
  send_summary: true
  summary_interval: 6
  summary_times:
    - "09:00"
    - "15:00"
    - "21:00"

# JWT配置
jwt:
  secret: "${JWT_SECRET}"
  expires: "24h"

# 市场配置
markets:
  bybit:
    enabled: true
    api_key: ""           # 可选，用于私有接口
    api_secret: ""        # 可选
    testnet: false
    symbols_limit: 200    # 最多跟踪的交易对数量
    hot_days: 30          # 热度有效期（天）
    periods: ["15m", "1h"] # 抓取周期
    fetch_interval: 60    # 抓取间隔（秒）
  a_stock:
    enabled: false
    symbols_limit: 200
    hot_days: 30
    periods: ["1d"]
    fetch_interval: 300
  us_stock:
    enabled: false
    symbols_limit: 200
    hot_days: 30
    periods: ["1d"]
    fetch_interval: 300

# EMA配置
ema:
  periods: [30, 60, 90]  # EMA计算周期

# 策略配置
strategies:
  box:
    enabled: true
    min_klines: 5
    max_klines: 100
    width_threshold: 2.0
    breakout_buffer: 0.1
    check_interval: 60
  trend:
    enabled: true
    ema_periods: [30, 60, 90]
    check_interval: 60
  key_level:
    enabled: true
    lookback_klines: 20
    level_distance: 0.5
    check_interval: 60
  volume_price:
    enabled: true
    volatility_multiplier: 2.0
    volume_multiplier: 2.0
    lookback_klines: 20
    check_interval: 60

# 交易配置
trading:
  enabled: true
  initial_capital: 100000              # 初始资金: 100000
  position_size: 0.1                   # 单笔仓位比例: 0.1
  stop_loss_percent: 0.02              # 止损比例: 0.02
  take_profit_percent: 0.05            # 止盈比例: 0.05

  # 风控参数
  max_daily_trades: 10                 # 每日最大交易: 10
  max_open_positions: 5                # 最大持仓数: 5
  max_drawdown_percent: 0.10           # 最大回撤: 0.10
  max_loss_per_trade: 0.02             # 单笔最大亏损: 0.02

  # 移动止损
  trailing_stop: true                  # 启用移动止损
  trailing_distance: 0.015             # 移动止损距离: 0.015

  # 信号有效期
  signal_expire_minutes: 60            # 信号过期分钟数: 60

# 实时监测配置
monitoring:
  price_check_interval: 1              # 价格检查间隔(秒)
  max_concurrent_monitors: 1000       # 最大并发监测数
  cleanup_interval: 300                 # 清理间隔(秒)
