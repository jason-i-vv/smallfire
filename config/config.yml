# 系统基础配置
app:
  name: "星火量化"
  mode: "debug"
  host: "0.0.0.0"
  port: 8080
  timezone: "Asia/Shanghai"

# 数据库配置
database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  dbname: "starfire_quant"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 5

# 日志配置
log:
  level: "debug"
  format: "json"
  output: "stdout"

# 飞书通知配置
feishu:
  enabled: true
  webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/c585be48-9114-4f71-bf3d-0f82f98ba4d6"
  send_summary: true
  summary_interval: 6
  summary_times:
    - "09:00"
    - "15:00"
    - "21:00"

# JWT配置
jwt:
  secret: "${JWT_SECRET}"
  expires: "24h"

# 市场配置
markets:
  bybit:
    enabled: true
    api_key: ""           # 可选，用于私有接口
    api_secret: ""        # 可选
    testnet: false
    symbols_limit: 200    # 最多跟踪的交易对数量
    hot_days: 30          # 热度有效期（天）
    periods: ["15m", "1h"] # 抓取周期
    fetch_interval: 60    # 抓取间隔（秒）
  a_stock:
    enabled: true
    symbols_limit: 200
    hot_days: 30
    periods: ["1d"]
    fetch_interval: 300
  us_stock:
    enabled: true
    symbols_limit: 200
    hot_days: 30
    periods: ["1d"]
    fetch_interval: 300

# EMA配置
ema:
  periods: [30, 60, 90]  # EMA计算周期

# 策略配置
strategies:
  box:
    enabled: false
    min_klines: 5
    max_klines: 100
    width_threshold: 2.0      # 固定阈值回退值（动态阈值失效时使用）
    breakout_buffer: 0.1

    # 动态阈值参数
    use_dynamic_threshold: true   # 启用动态阈值
    atr_period: 14               # ATR 计算周期（K线数）
    atr_multiplier: 2.0          # 阈值 = ATR均值/价格*100 * 倍数
    min_width_threshold: 0.3     # 最小宽度下限（%）
    max_width_threshold: 5.0    # 最大宽度上限（%）

    # Swing 点检测
    swing_lookback: 2            # 波峰波谷检测回溯K线数
    check_interval: 60
  trend:
    enabled: false
    ema_periods: [30, 60, 90]
    check_interval: 60
  key_level:
    enabled: false
    lookback_klines: 20
    level_distance: 0.5
    check_interval: 60
  volume_price:
    enabled: false
    volatility_multiplier: 2.0
    volume_multiplier: 2.0
    lookback_klines: 20
    check_interval: 60
  wick:
    enabled: true
    lookback_klines: 100
    body_percent_max: 30        # 实体占比上限（%）
    shadow_min_ratio: 2.0      # 引线最小倍数
    require_trend: true        # 是否要求趋势确认
    fake_breakout_enabled: true # 是否识别假突破
    breakout_threshold: 0.5     # 突破阈值（%）
    strength_lookback: 20      # 历史引线回溯数
    signal_cooldown: 30        # 信号冷却期（分钟）
    check_interval: 60

# 交易配置
trading:
  enabled: false
  initial_capital: 100000              # 初始资金: 100000
  position_size: 0.1                   # 单笔仓位比例: 0.1
  stop_loss_percent: 0.02              # 止损比例: 0.02
  take_profit_percent: 0.05            # 止盈比例: 0.05

  # 风控参数
  max_daily_trades: 10                 # 每日最大交易: 10
  max_open_positions: 5                # 最大持仓数: 5
  max_drawdown_percent: 0.10           # 最大回撤: 0.10
  max_loss_per_trade: 0.02             # 单笔最大亏损: 0.02

  # 移动止损
  trailing_stop: true                  # 启用移动止损
  trailing_distance: 0.015             # 移动止损距离: 0.015

  # 信号有效期
  signal_expire_minutes: 60            # 信号过期分钟数: 60

# 实时监测配置
monitoring:
  price_check_interval: 1              # 价格检查间隔(秒)
  max_concurrent_monitors: 1000       # 最大并发监测数
  cleanup_interval: 300                 # 清理间隔(秒)
