version: '3.8'

services:
  # ============================================
  # PostgreSQL 数据库
  # ============================================
  postgres:
    image: postgres:18
    container_name: starfire-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: starfire_quant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - starfire-network

  # ============================================
  # 后端 API 服务
  # ============================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: starfire-backend-dev
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
    volumes:
      - ./config:/root/config:ro
    networks:
      - starfire-network
    restart: unless-stopped

  # ============================================
  # 前端开发服务
  # ============================================
  frontend:
    image: node:20-alpine
    container_name: starfire-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./starfire-frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE: http://localhost:8080/api/v1
    depends_on:
      - backend
    networks:
      - starfire-network
    restart: unless-stopped

networks:
  starfire-network:
    driver: bridge

volumes:
  postgres_data_dev:
